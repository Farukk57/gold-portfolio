services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    networks:
      - portfolio

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - portfolio

networks:
  portfolio:
    driver: bridge
